desc: "Agent denies a pending operation for the frontend service"
labels:
  - deny
  - slack
runners:
  req: "${RUNN_ENDPOINT:-http://localhost:8080}"
vars:
  # Signing secret must match the server's SLACK_SIGNING_SECRET (ADR 0016 freshness).
  secret: "${SLACK_SIGNING_SECRET:-test-secret}"
  body: "payload=%7B%22actions%22%3A%5B%7B%22action_id%22%3A%22deny%22%2C%22value%22%3A%22%7B%5C%22action%5C%22%3A%5C%22canary_10%5C%22%2C%5C%22issued_at%5C%22%3A0%2C%5C%22resource_name%5C%22%3A%5C%22frontend%5C%22%2C%5C%22resource_type%5C%22%3A%5C%22service%5C%22%2C%5C%22target%5C%22%3A%5C%22v001%5C%22%2C%5C%22project%5C%22%3A%5C%22test-project%5C%22%2C%5C%22location%5C%22%3A%5C%22asia-northeast1%5C%22%7D%22%7D%5D%2C%22response_url%22%3A%22http%3A%2F%2Flocalhost%2Fcallback%22%2C%22type%22%3A%22block_actions%22%2C%22user%22%3A%7B%22id%22%3A%22UTEST456%22%7D%7D"
steps:
  - desc: "Compute a fresh Slack signature for the current time (ADR 0016 freshness window)"
    exec:
      command: |
        ts=$(date +%s)
        sig=$(printf 'v0:%s:%s' "$ts" '{{vars.body}}' | openssl dgst -sha256 -hmac '{{vars.secret}}' | awk '{print $NF}')
        printf '%s v0=%s' "$ts" "$sig"
  - desc: "Agent denies the canary operation on frontend service"
    req:
      /slack/interactive:
        post:
          headers:
            Content-Type: application/x-www-form-urlencoded
            X-Slack-Request-Timestamp: "{{ split(steps[0].stdout, ' ')[0] }}"
            X-Slack-Signature: "{{ split(steps[0].stdout, ' ')[1] }}"
          body:
            string: "{{vars.body}}"
    test: |
      current.res.status == 200
      && current.res.rawBody == ""
