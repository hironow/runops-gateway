desc: "Operator dispatches an agent task via /agent Slack Slash Command"
labels:
  - dispatch
  - slack
  - phase1
runners:
  req: "${RUNN_ENDPOINT:-http://localhost:8080}"
vars:
  # Signing secret must match the server's SLACK_SIGNING_SECRET (ADR 0016 freshness).
  secret: "${SLACK_SIGNING_SECRET:-test-secret}"
  valid_body: "command=%2Fagent&text=paintress+fix+M-42&user_id=U0123ABCD&response_url=http%3A%2F%2Flocalhost%2Fcallback"
  unknown_role_body: "command=%2Fagent&text=phonewave+do+something&user_id=U0123ABCD&response_url=http%3A%2F%2Flocalhost%2Fcallback"
  empty_text_body: "command=%2Fagent&text=&user_id=U0123ABCD&response_url=http%3A%2F%2Flocalhost%2Fcallback"
steps:
  - desc: "Compute a fresh timestamp + per-body Slack signatures (ADR 0016 freshness window)"
    exec:
      command: |
        ts=$(date +%s)
        sign() { printf 'v0:%s:%s' "$ts" "$1" | openssl dgst -sha256 -hmac '{{vars.secret}}' | awk '{print $NF}'; }
        printf '%s v0=%s v0=%s v0=%s' "$ts" "$(sign '{{vars.valid_body}}')" "$(sign '{{vars.unknown_role_body}}')" "$(sign '{{vars.empty_text_body}}')"
  - desc: "Operator dispatches /agent paintress fix M-42 — ephemeral dispatch confirmation (approve/deny gate)"
    req:
      /slack/command:
        post:
          headers:
            Content-Type: application/x-www-form-urlencoded
            X-Slack-Request-Timestamp: "{{ split(steps[0].stdout, ' ')[0] }}"
            X-Slack-Signature: "{{ split(steps[0].stdout, ' ')[1] }}"
          body:
            string: "{{vars.valid_body}}"
    test: |
      current.res.status == 200
      && current.res.body.response_type == "ephemeral"
      && current.res.rawBody contains "dispatch_approve"
      && current.res.rawBody contains "dispatch_deny"
      && current.res.rawBody contains "paintress"
      && current.res.rawBody contains "fix M-42"
  - desc: "Operator dispatches with unknown role 'phonewave' — ephemeral error"
    req:
      /slack/command:
        post:
          headers:
            Content-Type: application/x-www-form-urlencoded
            X-Slack-Request-Timestamp: "{{ split(steps[0].stdout, ' ')[0] }}"
            X-Slack-Signature: "{{ split(steps[0].stdout, ' ')[2] }}"
          body:
            string: "{{vars.unknown_role_body}}"
    test: |
      current.res.status == 200
      && current.res.body.response_type == "ephemeral"
      && current.res.body.text contains "unknown agent role"
      && current.res.body.text contains "phonewave"
  - desc: "Operator dispatches with empty text — ephemeral unknown-role error listing valid roles"
    req:
      /slack/command:
        post:
          headers:
            Content-Type: application/x-www-form-urlencoded
            X-Slack-Request-Timestamp: "{{ split(steps[0].stdout, ' ')[0] }}"
            X-Slack-Signature: "{{ split(steps[0].stdout, ' ')[3] }}"
          body:
            string: "{{vars.empty_text_body}}"
    test: |
      current.res.status == 200
      && current.res.body.response_type == "ephemeral"
      && current.res.body.text contains "unknown agent role"
      && current.res.body.text contains "paintress"
  - desc: "Unsigned /slack/command request is rejected with 401"
    req:
      /slack/command:
        post:
          headers:
            Content-Type: application/x-www-form-urlencoded
          body:
            string: "{{vars.valid_body}}"
    test: current.res.status == 401
