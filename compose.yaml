# Local development services for runops-gateway.
#
# Runs Jaeger v2 as the local OpenTelemetry trace backend (ADR 0020). The
# firebase Pub/Sub + Firestore emulator is NOT defined here — integration tests
# start it via testcontainers from docker/firebase-emulator/Dockerfile
# (ADR 0041). There is no compose-based emulator and no `just pubsub-up`.
#
# Quick start:
#   just trace-up           # start Jaeger (OTLP gRPC :4317, UI :16686)
#   just test-integration   # integration tests (testcontainers, needs Docker)

services:
  # Jaeger v2 all-in-one. OTLP gRPC (4317) is on by default in v2 — no
  # COLLECTOR_OTLP_ENABLED env required (that was the v1 flag). Image and
  # port choices follow ADR 0020 + experiments/2026-05-05_otel-cloud-run-pubsub-jaeger.md.
  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.17.0
    container_name: runops-jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC (default ingest)
      - "4318:4318"   # OTLP HTTP
    restart: unless-stopped
