name: CI

on:
  # Restrict push to long-lived branches so feature branch pushes do
  # not duplicate the pull_request run (= release-gate.yaml と同 pattern)。
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Go toolchain は setup-go で供給 (mise.toml の go = "latest" 相当の
      # stable 解決)。CI は mise 非依存。
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable

      - name: Set up Takumi Guard (Go)
        uses: flatt-security/setup-takumi-guard-golang@2e3c7c40b538cd68b2ac483def12982ebc8bc02e # v1

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint via go tool)
        run: CGO_ENABLED=0 go tool -modfile=tools/go.mod golangci-lint run ./...

      - name: Test (race detector)
        run: go test -race ./...

      - name: Build
        run: go build ./cmd/...

  # Run OpenTofu native tests (variable validation block contract,
  # ADR 0024). Separate from the Go test job so a tofu-only change
  # doesn't pull in the Go toolchain, and a Go-only change doesn't
  # pull in tofu. Matches the local 'just test-iac' recipe so dev
  # and CI stay in lockstep.
  test-iac:
    name: Test (OpenTofu)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: latest

      - name: tofu test
        working-directory: tofu
        run: |
          rm -f .terraform/terraform.tfstate
          tofu init -backend=false
          tofu test

  # Integration tests run entirely inside testcontainers-started firebase
  # emulator containers (ADR 0041). Each test package's TestMain builds the
  # emulator image from docker/firebase-emulator/Dockerfile, exposes Pub/Sub +
  # Firestore on dynamic ports, initializes topics, and tears the container
  # down. There is no docker compose, no external PUBSUB_EMULATOR_HOST /
  # FIRESTORE_EMULATOR_HOST, and no init scripts — the ubuntu-24.04 runner's
  # Docker daemon is the only prerequisite. tests/integration covers the
  # Pub/Sub bridge (Issue #0006, ADR 0028); internal/adapter/output/state
  # covers the Firestore registry (Issue #0011, ADR 0026).
  integration:
    name: Integration (testcontainers)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Go toolchain は setup-go で供給 (mise.toml の go = "latest" 相当の
      # stable 解決)。CI は mise 非依存。
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable

      - name: Set up Takumi Guard (Go)
        uses: flatt-security/setup-takumi-guard-golang@2e3c7c40b538cd68b2ac483def12982ebc8bc02e # v1

      - name: Download modules
        run: go mod download

      - name: Run integration tests (testcontainers)
        run: go test -tags=integration ./tests/integration/... ./internal/adapter/output/state/...
