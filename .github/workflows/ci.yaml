name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint via go tool)
        run: CGO_ENABLED=0 go tool -modfile=tools/go.mod golangci-lint run ./...

      - name: Test (race detector)
        run: go test -race ./...

      - name: Build
        run: go build ./cmd/...

  # Run OpenTofu native tests (variable validation block contract,
  # ADR 0024). Separate from the Go test job so a tofu-only change
  # doesn't pull in the Go toolchain, and a Go-only change doesn't
  # pull in tofu. Matches the local 'just test-iac' recipe so dev
  # and CI stay in lockstep.
  test-iac:
    name: Test (OpenTofu)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: latest

      - name: tofu test
        working-directory: tofu
        run: |
          rm -f .terraform/terraform.tfstate
          tofu init -backend=false
          tofu test
