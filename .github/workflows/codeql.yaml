name: CodeQL

# Go 向けの code scanning (SAST)。public repo なので CodeQL は無料。
# 結果は Security > Code scanning alerts に上がる。
#
# 分類について: 本 workflow file は release-gate の auth_boundary glob
# (release-gate.yaml / cd.yaml / deploy*.yaml / CODEOWNERS /
# release-gate-paths.yaml) のいずれにもマッチせず routing 扱い。
# CD の deploy 経路には一切関与しない (独立した security scan のみ)。

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]
  schedule:
    # 週次 (月 03:27 UTC)。依存・ルール更新を定期的に再スキャン。
    - cron: "27 3 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write # CodeQL の SARIF アップロードに必須
  actions: read # workflow メタ参照 (fork PR 互換)

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-24.04
    steps:
      # SHA pin: 既存 workflow と同一 pin を流用 (org policy "Require actions
      # to be pinned to a full-length commit SHA")。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Go toolchain は setup-go で揃える (mise.toml の go = "latest" 相当の
      # stable 解決)。CI test job と同じ流儀で dev/CI を lockstep に保つ。
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: go
          build-mode: autobuild

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:go"
