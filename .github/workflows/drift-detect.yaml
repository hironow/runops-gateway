name: Drift detect

# Scheduled + on-demand drift radar (ADR 0044). Reuses the tofu-drift-gate
# composite action in report mode (fail_on_drift=false) and opens a GitHub
# issue when google_* infra has drifted from OpenTofu state — without waiting
# for a deploy. Detective only; the deploy-time gate lives in cd.yaml (ADR 0043).
#
# The `with:` inputs MUST stay in parity with cd.yaml's infra/drift-gate and the
# action (enforced by scripts/check-drift-gate-parity.sh): an omitted var falls
# back to the action default and would read as false-positive drift.

on:
  schedule:
    # daily, ~03:17 JST (18:17 UTC). Off-peak and non-round to avoid the
    # top-of-hour scheduler stampede.
    - cron: "17 18 * * *"
  workflow_dispatch:

concurrency:
  group: drift-detect
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # Workload Identity Federation to GCP
  issues: write     # open / comment the drift issue

jobs:
  radar:
    name: Tofu Drift Radar
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: gate
        uses: ./.github/actions/tofu-drift-gate
        with:
          fail_on_drift: "false"   # report mode: never fail, expose drift via output
          wif_provider:    ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          state_bucket:    ${{ vars.TOFU_STATE_BUCKET }}
          project_id:          ${{ vars.GCP_PROJECT_ID }}
          allowed_slack_users: ${{ vars.ALLOWED_SLACK_USERS }}
          github_repo:         ${{ github.repository }}
          image: >-
            ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runops/runops-gateway:latest
          slack_default_channel_id:           ${{ vars.SLACK_DEFAULT_CHANNEL_ID }}
          otel_traces_sampler_arg:            ${{ vars.OTEL_TRACES_SAMPLER_ARG }}
          exe_coder_vm_sa_email:              ${{ vars.EXE_CODER_VM_SA_EMAIL }}
          dlq_alert_email:                    ${{ vars.DLQ_ALERT_EMAIL }}
          broker_audience:                    ${{ vars.BROKER_AUDIENCE }}
          broker_gateway_service_sas:         ${{ vars.BROKER_GATEWAY_SERVICE_SAS }}
          broker_workspace_daemon_sas:        ${{ vars.BROKER_WORKSPACE_DAEMON_SAS }}
          broker_operator_emails:             ${{ vars.BROKER_OPERATOR_EMAILS }}
          github_app_id:                      ${{ vars.GITHUB_APP_ID }}
          github_app_private_key_secret_name: ${{ vars.GITHUB_APP_PRIVATE_KEY_SECRET_NAME }}
          broker_use_firestore_registry:      ${{ vars.BROKER_USE_FIRESTORE_REGISTRY }}
          cloud_run_min_instances:            ${{ vars.CLOUD_RUN_MIN_INSTANCES || '0' }}
          cloud_run_max_instances:            ${{ vars.CLOUD_RUN_MAX_INSTANCES || '3' }}

      - name: Open or update drift issue
        if: steps.gate.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          # Idempotent: reuse the open drift issue if one exists, else open one.
          existing=$(gh issue list --search 'in:title Tofu drift detected' --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Still drifting as of ${RUN_URL}"
          else
            gh issue create \
              --title "Tofu drift detected" \
              --body "google_* drift detected by the scheduled radar (ADR 0044). See run: ${RUN_URL}"
          fi
