name: CD

on:
  push:
    branches: [main]

# Deployments must not be cancelled mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

# ---------------------------------------------------------------------------
# Required GitHub repository variables (Settings > Secrets and variables >
# Actions > Variables):
#
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#     e.g. projects/123/locations/global/workloadIdentityPools/github/providers/github
#   GCP_SERVICE_ACCOUNT
#     e.g. chatops-github-deployer@YOUR_PROJECT.iam.gserviceaccount.com
#   GCP_PROJECT_ID              e.g. your-gcp-project
#   ARTIFACT_REGISTRY_LOCATION  e.g. asia-northeast1
#   CLOUD_RUN_LOCATION          e.g. asia-northeast1
#   TOFU_STATE_BUCKET           GCS bucket for OpenTofu remote state
#   ALLOWED_SLACK_USERS         comma-separated Slack user IDs for approval
#
# Optional GitHub repository variables (Phase 4b — runops-gateway own infra):
#
#   SLACK_DEFAULT_CHANNEL_ID    fallback channel id for FallbackNotifier
#                               (ADR 0017). Empty disables the fallback.
#   OTEL_TRACES_SAMPLER_ARG     OTel parentbased_traceidratio arg
#                               (ADR 0020). Default 0.1; tune without code.
#   EXE_CODER_VM_SA_EMAIL       service account email of the exe-coder VM
#                               that runs dmail-receiver / dmail-emitter
#                               (managed in hironow/dotfiles). Empty until
#                               that SA is provisioned; the Pub/Sub IAM
#                               and Cloud Trace agent grants skip on empty.
#   DLQ_ALERT_EMAIL             Cloud Monitoring incident destination for
#                               the D-Mail DLQ forwarding alert. Empty
#                               disables the channel and policy. See
#                               docs/runbooks/dlq.md.
#   CLOUD_RUN_MIN_INSTANCES     runops-gateway Cloud Run min_instance_count.
#                               Default 0 (cold start ok). Set to 1 when
#                               enabling Phase 3 outbound StreamingPull
#                               (ADR 0018).
#   CLOUD_RUN_MAX_INSTANCES     runops-gateway Cloud Run max_instance_count.
#                               Default 3.
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # Detect which paths changed so downstream jobs can skip when irrelevant.
  # -------------------------------------------------------------------------
  check-changes:
    name: Check changed paths
    runs-on: ubuntu-24.04
    outputs:
      tofu: ${{ steps.filter.outputs.tofu }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
      # Self-impl of dorny/paths-filter (kept out of the action allow list
      # because it isn't a verified-creator marketplace action). Equivalent
      # behaviour for our single 'tofu' filter.
      - id: filter
        run: |
          set -euo pipefail
          if git diff --name-only HEAD~1 HEAD | grep -qE '^tofu/'; then
            echo "tofu=true" >> "$GITHUB_OUTPUT"
          else
            echo "tofu=false" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------------
  # Apply infrastructure changes.
  # Runs only when tofu/** is modified; skipped on pure code pushes.
  #
  # NOTE: tofu/main.tf has `lifecycle { ignore_changes = [image] }` so
  # Terraform never overwrites the container image that the deploy job manages.
  # TF_VAR_image is therefore a placeholder value used only on first creation.
  # -------------------------------------------------------------------------
  infra:
    name: Apply Infrastructure (OpenTofu)
    needs: check-changes
    if: needs.check-changes.outputs.tofu == 'true'
    runs-on: ubuntu-24.04
    environment: production
    defaults:
      run:
        working-directory: tofu

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: latest

      - name: Init (remote state on GCS)
        run: |
          tofu init \
            -backend-config="bucket=${{ vars.TOFU_STATE_BUCKET }}"

      - name: Apply
        run: tofu apply -auto-approve
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_allowed_slack_users: ${{ vars.ALLOWED_SLACK_USERS }}
          TF_VAR_github_repo: ${{ github.repository }}
          TF_VAR_tofu_state_bucket: ${{ vars.TOFU_STATE_BUCKET }}
          # Image is managed by the deploy job via `gcloud run deploy`.
          # This value is only used on first resource creation; subsequent
          # applies leave the image unchanged (ignore_changes in main.tf).
          TF_VAR_image: >-
            ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runops/runops-gateway:latest
          # Phase 4b optional vars — empty defaults are accepted by tofu.
          TF_VAR_slack_default_channel_id: ${{ vars.SLACK_DEFAULT_CHANNEL_ID }}
          TF_VAR_otel_traces_sampler_arg: ${{ vars.OTEL_TRACES_SAMPLER_ARG }}
          TF_VAR_exe_coder_vm_sa_email: ${{ vars.EXE_CODER_VM_SA_EMAIL }}
          TF_VAR_dlq_alert_email: ${{ vars.DLQ_ALERT_EMAIL }}
          # Cloud Run scaling — fall back to the tofu code defaults when the
          # GitHub repo variable is unset, because tofu's number type rejects
          # the empty string. Set CLOUD_RUN_MIN_INSTANCES=1 when enabling
          # Phase 3 outbound StreamingPull (ADR 0018).
          TF_VAR_cloud_run_min_instances: ${{ vars.CLOUD_RUN_MIN_INSTANCES || '0' }}
          TF_VAR_cloud_run_max_instances: ${{ vars.CLOUD_RUN_MAX_INSTANCES || '3' }}

  # -------------------------------------------------------------------------
  # Build container image and deploy to Cloud Run.
  # Always runs on push to main.
  # Waits for infra when tofu/ changed; starts immediately when skipped.
  # -------------------------------------------------------------------------
  deploy:
    name: Build & Deploy
    needs: [check-changes, infra]
    # Run if infra succeeded OR was skipped (pure code push). Never run if
    # infra failed — a broken infra state should block the image deploy.
    if: >-
      always() &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped')
    runs-on: ubuntu-24.04
    environment: production

    env:
      IMAGE: >-
        ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runops/runops-gateway
      DMAIL_RECEIVER_IMAGE: >-
        ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runops/dmail-receiver
      DMAIL_EMITTER_IMAGE: >-
        ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runops/dmail-emitter

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker \
            ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push (runops-gateway)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          # Layer cache via GitHub Actions cache backend — no separate registry needed.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The dmail-receiver / dmail-emitter daemons run on the workspace
      # VM (managed by hironow/dotfiles), not on Cloud Run. Build &
      # push the images alongside the gateway so dotfiles can pull
      # them via 'docker run' (Issue 0001 + the 2026-05-06 placement
      # experiment). No Cloud Run deploy step — the workspace VM
      # systemd unit handles lifecycle.
      - name: Build and push (dmail-receiver)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/dmail-receiver.Dockerfile
          push: true
          tags: |
            ${{ env.DMAIL_RECEIVER_IMAGE }}:${{ github.sha }}
            ${{ env.DMAIL_RECEIVER_IMAGE }}:latest
          cache-from: type=gha,scope=dmail-receiver
          cache-to: type=gha,mode=max,scope=dmail-receiver

      - name: Build and push (dmail-emitter)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/dmail-emitter.Dockerfile
          push: true
          tags: |
            ${{ env.DMAIL_EMITTER_IMAGE }}:${{ github.sha }}
            ${{ env.DMAIL_EMITTER_IMAGE }}:latest
          cache-from: type=gha,scope=dmail-emitter
          cache-to: type=gha,mode=max,scope=dmail-emitter

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3
        with:
          service: runops-gateway
          region: ${{ vars.CLOUD_RUN_LOCATION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          # deploy-cloudrun@v2 routes 100% traffic to the new revision by default.

      # Post-deploy smoke: prove that the just-shipped revision is reachable
      # AND that the basic Slack request-handling pipeline still rejects
      # spoofed inputs the way it did on the previous revision. Both checks
      # are read-only — no GCP-side side effects, no Slack API calls.
      #
      # If any of these fail, the deploy job fails and the operator should
      # immediately roll back via:
      #   gcloud run services update-traffic runops-gateway \
      #     --region=${{ vars.CLOUD_RUN_LOCATION }} \
      #     --to-revisions=PREVIOUS_REVISION=100
      - name: Post-deploy smoke
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail

          # 1. /_healthz は 200 を返す
          status=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/_healthz")
          if [ "${status}" != "200" ]; then
            echo "smoke: /_healthz returned ${status}, expected 200" >&2
            exit 1
          fi

          # 2. /slack/interactive は不正署名で 401 (Phase 0 regression)
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SERVICE_URL}/slack/interactive" \
            -H "X-Slack-Signature: v0=invalid" \
            -H "X-Slack-Request-Timestamp: 1" \
            --data-raw "payload=%7B%7D")
          if [ "${status}" != "401" ]; then
            echo "smoke: /slack/interactive bad-sig returned ${status}, expected 401" >&2
            exit 1
          fi

          # 3. /slack/command は不正署名で 401 (Phase 1 regression)
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SERVICE_URL}/slack/command" \
            -H "X-Slack-Signature: v0=invalid" \
            -H "X-Slack-Request-Timestamp: 1" \
            --data-raw "command=%2Frunops")
          if [ "${status}" != "401" ]; then
            echo "smoke: /slack/command bad-sig returned ${status}, expected 401" >&2
            exit 1
          fi

          echo "smoke: all checks passed against ${SERVICE_URL}"
