name: CD

on:
  push:
    branches: [main]

# Deployments must not be cancelled mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-24.04
    environment: production

    env:
      IMAGE: ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runops/runops-gateway

    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP via Workload Identity Federation (no long-lived key).
      # Required GitHub variables (repository or environment level):
      #   GCP_WORKLOAD_IDENTITY_PROVIDER  e.g. projects/123/locations/global/workloadIdentityPools/github/providers/github
      #   GCP_SERVICE_ACCOUNT             e.g. runops-gateway-deployer@YOUR_PROJECT.iam.gserviceaccount.com
      #   GCP_PROJECT_ID                  e.g. your-gcp-project
      #   ARTIFACT_REGISTRY_LOCATION      e.g. asia-northeast1
      #   CLOUD_RUN_SERVICE               e.g. runops-gateway
      #   CLOUD_RUN_REGION                e.g. asia-northeast1
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker \
            ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          # Layer cache via GitHub Actions cache backend (no external registry needed).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.CLOUD_RUN_REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          # runops-gateway itself is deployed with immediate 100% traffic.
          # (Canary approval flow is for managed applications, not the gateway itself.)
          flags: --traffic=100
