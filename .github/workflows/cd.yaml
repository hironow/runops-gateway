name: CD

# Per ADR 0031 + ADR 0033: this workflow has two trigger modes.
#
# 1) push: branches: [main]
#    Auto-deploy ONLY for routing-classified commits (release-gate
#    workflow publishes a `release-gate` commit status with
#    description=category=routing). auth_boundary / schema commits
#    are skipped here and must be deployed via workflow_dispatch.
#
# 2) workflow_dispatch
#    Manual deploy targeting an explicit ref. The dispatching
#    operator declares the expected category; the gate-check job
#    verifies that the diff between the deploy ref and the current
#    production tag matches the declared category. Mismatches fail
#    closed.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: |
          Explicit ref to deploy (full SHA preferred). For auth_boundary
          and schema deploys this MUST be a commit reachable from main
          (the rollback target), per ADR 0031. Routing dispatches may
          target any ref but should normally use a `prod-*` tag.
        required: true
        type: string
      declared_category:
        description: |
          Category the operator declares the deploy ref to be:
          routing | auth_boundary | schema. The gate-check job
          verifies it against the diff.
        required: true
        type: choice
        options:
          - routing
          - auth_boundary
          - schema
      reason:
        description: Free-text justification for the deploy_log entry.
        required: true
        type: string

# Deployments must not be cancelled mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation
  statuses: read    # gate-check reads release-gate commit status

# ---------------------------------------------------------------------------
# Required GitHub repository variables (Settings > Secrets and variables >
# Actions > Variables):
#
#   GCP_WORKLOAD_IDENTITY_PROVIDER
#     e.g. projects/123/locations/global/workloadIdentityPools/github/providers/github
#   GCP_SERVICE_ACCOUNT
#     e.g. chatops-github-deployer@YOUR_PROJECT.iam.gserviceaccount.com
#   GCP_PROJECT_ID              e.g. your-gcp-project
#   ARTIFACT_REGISTRY_LOCATION  e.g. asia-northeast1
#   CLOUD_RUN_LOCATION          e.g. asia-northeast1
#   TOFU_STATE_BUCKET           GCS bucket for OpenTofu remote state
#   ALLOWED_SLACK_USERS         comma-separated Slack user IDs for approval
#
# Optional GitHub repository variables (Phase 4b — runops-gateway own infra):
#
#   SLACK_DEFAULT_CHANNEL_ID    fallback channel id for FallbackNotifier
#                               (ADR 0017). Empty disables the fallback.
#   OTEL_TRACES_SAMPLER_ARG     OTel parentbased_traceidratio arg
#                               (ADR 0020). Default 0.1; tune without code.
#   EXE_CODER_VM_SA_EMAIL       service account email of the exe-coder VM
#                               that runs dmail-receiver / dmail-emitter
#                               (managed in hironow/dotfiles). Empty until
#                               that SA is provisioned; the Pub/Sub IAM
#                               and Cloud Trace agent grants skip on empty.
#   DLQ_ALERT_EMAIL             Cloud Monitoring incident destination for
#                               the D-Mail DLQ forwarding alert. Empty
#                               disables the channel and policy. See
#                               docs/runbooks/dlq.md.
#   CLOUD_RUN_MIN_INSTANCES     runops-gateway Cloud Run min_instance_count.
#                               Default 0 (cold start ok). Set to 1 when
#                               enabling Phase 3 outbound StreamingPull
#                               (ADR 0018).
#   CLOUD_RUN_MAX_INSTANCES     runops-gateway Cloud Run max_instance_count.
#                               Default 3.
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # Release gate check (ADR 0031, ADR 0033).
  #
  # On push:main — read the release-gate commit status published by the
  # release-gate workflow and refuse to proceed unless category=routing.
  # auth_boundary / schema commits skip the deploy + infra apply jobs
  # and surface a `gated by ADR 0031` reason.
  #
  # On workflow_dispatch — verify the operator's declared_category
  # matches the actual diff between the dispatch ref and the current
  # production tag, by re-running the same classification logic
  # locally. Mismatches fail closed.
  # -------------------------------------------------------------------------
  gate-check:
    name: Release gate check
    runs-on: ubuntu-24.04
    outputs:
      category: ${{ steps.resolve.outputs.category }}
      proceed: ${{ steps.resolve.outputs.proceed }}
      reason: ${{ steps.resolve.outputs.reason }}
      # deploy_sha is the canonical commit SHA every downstream job
      # MUST checkout / build / deploy. On push: it is github.sha.
      # On workflow_dispatch: it is the input ref resolved to a full
      # SHA. This closes the codex v6 #2 finding that dispatch input
      # ref was not actually used by build/deploy.
      deploy_sha: ${{ steps.resolve.outputs.deploy_sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_SHA: ${{ github.sha }}
          DISPATCH_REF: ${{ github.event.inputs.ref }}
          DECLARED_CATEGORY: ${{ github.event.inputs.declared_category }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ]; then
            DEPLOY_SHA="$PUSH_SHA"
            for i in 1 2 3 4 5 6; do
              status=$(gh api "repos/${REPO}/commits/${DEPLOY_SHA}/statuses" \
                --jq '[.[] | select(.context == "release-gate")] | .[0]' || true)
              if [ -n "$status" ] && [ "$status" != "null" ]; then
                break
              fi
              sleep 10
            done
            if [ -z "$status" ] || [ "$status" = "null" ]; then
              echo "::error::release-gate status not found on commit $DEPLOY_SHA after 60s. Refusing to deploy (fail-closed per ADR 0031)." >&2
              exit 1
            fi
            state=$(echo "$status" | jq -r '.state')
            description=$(echo "$status" | jq -r '.description // ""')
            if [ "$state" != "success" ]; then
              echo "::error::release-gate status state=$state on commit $DEPLOY_SHA." >&2
              exit 1
            fi
            category=$(echo "$description" | sed -nE 's/^category=([a-z_]+).*/\1/p')
            if [ -z "$category" ]; then
              echo "::error::release-gate status description did not encode category: $description" >&2
              exit 1
            fi
            echo "category=$category" >> "$GITHUB_OUTPUT"
            echo "deploy_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
            if [ "$category" = "routing" ]; then
              echo "proceed=true" >> "$GITHUB_OUTPUT"
              echo "reason=routing auto-deploy (sha=$DEPLOY_SHA)" >> "$GITHUB_OUTPUT"
            else
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              echo "reason=gated by ADR 0031 (category=$category, use workflow_dispatch with declared_category=$category to deploy)" >> "$GITHUB_OUTPUT"
            fi
          else
            # workflow_dispatch — verify declared category matches the
            # ACTUAL release-gate classification of the dispatched ref
            # (codex v6 #1: prevent self-declaration bypass).
            if [ -z "$DISPATCH_REF" ] || [ -z "$DECLARED_CATEGORY" ]; then
              echo "::error::workflow_dispatch requires both ref and declared_category inputs." >&2
              exit 1
            fi
            # Resolve the input ref (could be a tag / branch / short SHA)
            # to a full commit SHA for downstream consumers.
            DEPLOY_SHA=$(git rev-parse "$DISPATCH_REF" 2>/dev/null || true)
            if [ -z "$DEPLOY_SHA" ] || [ "${#DEPLOY_SHA}" -ne 40 ]; then
              echo "::error::Cannot resolve dispatch ref to a 40-char SHA: $DISPATCH_REF" >&2
              exit 1
            fi
            echo "deploy_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
            # Read the release-gate status that was published for this
            # SHA (the release-gate workflow runs on every push). If
            # missing, refuse — operator cannot bypass classification.
            for i in 1 2 3 4 5 6; do
              status=$(gh api "repos/${REPO}/commits/${DEPLOY_SHA}/statuses" \
                --jq '[.[] | select(.context == "release-gate")] | .[0]' || true)
              if [ -n "$status" ] && [ "$status" != "null" ]; then
                break
              fi
              sleep 10
            done
            if [ -z "$status" ] || [ "$status" = "null" ]; then
              echo "::error::release-gate status missing on dispatch ref $DEPLOY_SHA. Refusing to deploy (fail-closed)." >&2
              exit 1
            fi
            description=$(echo "$status" | jq -r '.description // ""')
            actual_category=$(echo "$description" | sed -nE 's/^category=([a-z_]+).*/\1/p')
            if [ -z "$actual_category" ]; then
              echo "::error::release-gate status missing category for dispatch ref $DEPLOY_SHA." >&2
              exit 1
            fi
            if [ "$actual_category" != "$DECLARED_CATEGORY" ]; then
              echo "::error::declared_category=$DECLARED_CATEGORY but release-gate classified the ref as $actual_category. Refusing to deploy." >&2
              exit 1
            fi
            # auth_boundary / schema dispatches must target a ref
            # reachable from main (the rollback target, ADR 0031
            # §"main promotion path").
            if [ "$DECLARED_CATEGORY" != "routing" ]; then
              if ! git merge-base --is-ancestor "$DEPLOY_SHA" "origin/main" 2>/dev/null; then
                echo "::error::auth_boundary/schema dispatch ref $DEPLOY_SHA is not reachable from main. Promote to main first per ADR 0031." >&2
                exit 1
              fi
            fi
            echo "category=$actual_category" >> "$GITHUB_OUTPUT"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "reason=workflow_dispatch verified (category=$actual_category, sha=$DEPLOY_SHA)" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------------
  # Detect which paths changed so downstream jobs can skip when irrelevant.
  # -------------------------------------------------------------------------
  check-changes:
    name: Check changed paths
    needs: gate-check
    if: needs.gate-check.outputs.proceed == 'true'
    runs-on: ubuntu-24.04
    outputs:
      tofu: ${{ steps.filter.outputs.tofu }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
      # Self-impl of dorny/paths-filter (kept out of the action allow list
      # because it isn't a verified-creator marketplace action). Equivalent
      # behaviour for our single 'tofu' filter.
      - id: filter
        run: |
          set -euo pipefail
          if git diff --name-only HEAD~1 HEAD | grep -qE '^tofu/'; then
            echo "tofu=true" >> "$GITHUB_OUTPUT"
          else
            echo "tofu=false" >> "$GITHUB_OUTPUT"
          fi

  # -------------------------------------------------------------------------
  # Apply infrastructure changes.
  # Runs only when tofu/** is modified; skipped on pure code pushes.
  #
  # NOTE: tofu/main.tf has `lifecycle { ignore_changes = [image] }` so
  # Terraform never overwrites the container image that the deploy job manages.
  # TF_VAR_image is therefore a placeholder value used only on first creation.
  # -------------------------------------------------------------------------
  infra:
    name: Apply Infrastructure (OpenTofu)
    needs: [gate-check, check-changes]
    # Apply infra ONLY when:
    #   - gate-check says proceed=true (routing on push, dispatch otherwise)
    #   - tofu/** changed
    # auth_boundary / schema gate-check on push will set proceed=false,
    # blocking infra apply (closing the cd.yaml infra-apply bypass
    # cited in codex review v4 #1).
    if: |
      needs.gate-check.outputs.proceed == 'true' &&
      needs.check-changes.outputs.tofu == 'true'
    runs-on: ubuntu-24.04
    environment: production
    defaults:
      run:
        working-directory: tofu

    steps:
      # Checkout the resolved deploy_sha (workflow_dispatch input ref
      # resolved to a 40-char SHA, or github.sha for push). Without
      # this, dispatch deploys would silently apply infra from the
      # branch HEAD instead of the input ref (codex review v6 #2).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.gate-check.outputs.deploy_sha }}

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: latest

      - name: Init (remote state on GCS)
        run: |
          tofu init \
            -backend-config="bucket=${{ vars.TOFU_STATE_BUCKET }}"

      - name: Apply
        run: tofu apply -auto-approve
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_allowed_slack_users: ${{ vars.ALLOWED_SLACK_USERS }}
          TF_VAR_github_repo: ${{ github.repository }}
          TF_VAR_tofu_state_bucket: ${{ vars.TOFU_STATE_BUCKET }}
          # Image is managed by the deploy job via `gcloud run deploy`.
          # This value is only used on first resource creation; subsequent
          # applies leave the image unchanged (ignore_changes in main.tf).
          TF_VAR_image: >-
            ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runops/runops-gateway:latest
          # Phase 4b optional vars — empty defaults are accepted by tofu.
          TF_VAR_slack_default_channel_id: ${{ vars.SLACK_DEFAULT_CHANNEL_ID }}
          TF_VAR_otel_traces_sampler_arg: ${{ vars.OTEL_TRACES_SAMPLER_ARG }}
          TF_VAR_exe_coder_vm_sa_email: ${{ vars.EXE_CODER_VM_SA_EMAIL }}
          TF_VAR_dlq_alert_email: ${{ vars.DLQ_ALERT_EMAIL }}
          # Token broker (refs#0007, ADR 0032). Sourced from GitHub repo
          # variables; unset => empty string => tofu var default "" =>
          # broker stays dormant. Setting these repo variables (auth_boundary
          # grant matrix, governed by repo-settings edit permission) and then
          # applying activates the broker. The private key VALUE is uploaded
          # out-of-band to Secret Manager, never via TF_VAR.
          TF_VAR_broker_audience: ${{ vars.BROKER_AUDIENCE }}
          TF_VAR_broker_gateway_service_sas: ${{ vars.BROKER_GATEWAY_SERVICE_SAS }}
          TF_VAR_broker_workspace_daemon_sas: ${{ vars.BROKER_WORKSPACE_DAEMON_SAS }}
          TF_VAR_broker_operator_emails: ${{ vars.BROKER_OPERATOR_EMAILS }}
          TF_VAR_github_app_id: ${{ vars.GITHUB_APP_ID }}
          TF_VAR_github_app_private_key_secret_name: ${{ vars.GITHUB_APP_PRIVATE_KEY_SECRET_NAME }}
          TF_VAR_broker_use_firestore_registry: ${{ vars.BROKER_USE_FIRESTORE_REGISTRY }}
          # Cloud Run scaling — fall back to the tofu code defaults when the
          # GitHub repo variable is unset, because tofu's number type rejects
          # the empty string. Set CLOUD_RUN_MIN_INSTANCES=1 when enabling
          # Phase 3 outbound StreamingPull (ADR 0018).
          TF_VAR_cloud_run_min_instances: ${{ vars.CLOUD_RUN_MIN_INSTANCES || '0' }}
          TF_VAR_cloud_run_max_instances: ${{ vars.CLOUD_RUN_MAX_INSTANCES || '3' }}

  # -------------------------------------------------------------------------
  # Deploy-time drift gate (ADR 0043). Runs AFTER infra so infra's just-applied
  # changes are already reconciled; its real value is the infra-skipped path,
  # where it catches un-applied tofu changes and manual gcloud/console drift.
  # google_* only — github_* resources are excluded so the plan is token-free.
  # Keep the `with:` inputs in parity with the infra Apply TF_VAR_* set
  # (enforced by scripts/check-drift-gate-parity.sh).
  # -------------------------------------------------------------------------
  drift-gate:
    name: Tofu Drift Gate
    needs: [gate-check, check-changes, infra]
    # always() so the tofu-unchanged (infra=skipped) path still runs the gate.
    if: >-
      always() &&
      needs.gate-check.outputs.proceed == 'true' &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped')
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.gate-check.outputs.deploy_sha }}
      - uses: ./.github/actions/tofu-drift-gate
        with:
          wif_provider:    ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          state_bucket:    ${{ vars.TOFU_STATE_BUCKET }}
          project_id:          ${{ vars.GCP_PROJECT_ID }}
          allowed_slack_users: ${{ vars.ALLOWED_SLACK_USERS }}
          github_repo:         ${{ github.repository }}
          image: >-
            ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runops/runops-gateway:latest
          slack_default_channel_id:           ${{ vars.SLACK_DEFAULT_CHANNEL_ID }}
          otel_traces_sampler_arg:            ${{ vars.OTEL_TRACES_SAMPLER_ARG }}
          exe_coder_vm_sa_email:              ${{ vars.EXE_CODER_VM_SA_EMAIL }}
          dlq_alert_email:                    ${{ vars.DLQ_ALERT_EMAIL }}
          broker_audience:                    ${{ vars.BROKER_AUDIENCE }}
          broker_gateway_service_sas:         ${{ vars.BROKER_GATEWAY_SERVICE_SAS }}
          broker_workspace_daemon_sas:        ${{ vars.BROKER_WORKSPACE_DAEMON_SAS }}
          broker_operator_emails:             ${{ vars.BROKER_OPERATOR_EMAILS }}
          github_app_id:                      ${{ vars.GITHUB_APP_ID }}
          github_app_private_key_secret_name: ${{ vars.GITHUB_APP_PRIVATE_KEY_SECRET_NAME }}
          broker_use_firestore_registry:      ${{ vars.BROKER_USE_FIRESTORE_REGISTRY }}
          cloud_run_min_instances:            ${{ vars.CLOUD_RUN_MIN_INSTANCES || '0' }}
          cloud_run_max_instances:            ${{ vars.CLOUD_RUN_MAX_INSTANCES || '3' }}

  # -------------------------------------------------------------------------
  # Build container image and deploy to Cloud Run.
  # Always runs on push to main.
  # Waits for infra when tofu/ changed; starts immediately when skipped.
  # -------------------------------------------------------------------------
  deploy:
    name: Build & Deploy
    needs: [gate-check, check-changes, infra, drift-gate]
    # Deploy ONLY when:
    #   - gate-check says proceed=true
    #   - infra succeeded OR was skipped
    #   - drift-gate passed (no google_* drift)
    # Never deploy on auth_boundary/schema push (gate-check blocks);
    # those deploys go through workflow_dispatch with declared_category.
    if: >-
      always() &&
      needs.gate-check.outputs.proceed == 'true' &&
      (needs.infra.result == 'success' || needs.infra.result == 'skipped') &&
      needs.drift-gate.result == 'success'
    runs-on: ubuntu-24.04
    environment: production
    # The deploy job pushes the prod-* immutable tag (ADR 0031). The
    # workflow-level grant is contents: read, so this job overrides it
    # with contents: write. Job-level permissions REPLACE (not merge)
    # the workflow-level set, so id-token: write is re-declared here for
    # Workload Identity Federation auth to GCP.
    permissions:
      contents: write
      id-token: write

    env:
      IMAGE: >-
        ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runops/runops-gateway
      DMAIL_RECEIVER_IMAGE: >-
        ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runops/dmail-receiver
      DMAIL_EMITTER_IMAGE: >-
        ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/runops/dmail-emitter
      # Deploy SHA is the canonical commit ref for this run (resolved
      # by gate-check). All checkout / build / deploy steps below use
      # this rather than github.sha so that workflow_dispatch input
      # ref is actually what gets shipped (codex review v6 #2).
      DEPLOY_SHA: ${{ needs.gate-check.outputs.deploy_sha }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.gate-check.outputs.deploy_sha }}
          fetch-depth: 0  # need history for prod-* tag creation step

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker \
            ${{ vars.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push (runops-gateway)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.DEPLOY_SHA }}
            ${{ env.IMAGE }}:latest
          # Layer cache via GitHub Actions cache backend — no separate registry needed.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The dmail-receiver / dmail-emitter daemons run on the workspace
      # VM (managed by hironow/dotfiles), not on Cloud Run. Build &
      # push the images alongside the gateway so dotfiles can pull
      # them via 'docker run' (Issue 0001 + the 2026-05-06 placement
      # experiment). No Cloud Run deploy step — the workspace VM
      # systemd unit handles lifecycle.
      - name: Build and push (dmail-receiver)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/dmail-receiver.Dockerfile
          push: true
          tags: |
            ${{ env.DMAIL_RECEIVER_IMAGE }}:${{ env.DEPLOY_SHA }}
            ${{ env.DMAIL_RECEIVER_IMAGE }}:latest
          cache-from: type=gha,scope=dmail-receiver
          cache-to: type=gha,mode=max,scope=dmail-receiver

      - name: Build and push (dmail-emitter)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/dmail-emitter.Dockerfile
          push: true
          tags: |
            ${{ env.DMAIL_EMITTER_IMAGE }}:${{ env.DEPLOY_SHA }}
            ${{ env.DMAIL_EMITTER_IMAGE }}:latest
          cache-from: type=gha,scope=dmail-emitter
          cache-to: type=gha,mode=max,scope=dmail-emitter

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3
        with:
          service: runops-gateway
          region: ${{ vars.CLOUD_RUN_LOCATION }}
          image: ${{ env.IMAGE }}:${{ env.DEPLOY_SHA }}
          # deploy-cloudrun@v2 routes 100% traffic to the new revision by default.

      # Post-deploy smoke: prove that the just-shipped revision is reachable
      # AND that the basic Slack request-handling pipeline still rejects
      # spoofed inputs the way it did on the previous revision. Both checks
      # are read-only — no GCP-side side effects, no Slack API calls.
      #
      # If any of these fail, the deploy job fails and the operator should
      # immediately roll back via:
      #   gcloud run services update-traffic runops-gateway \
      #     --region=${{ vars.CLOUD_RUN_LOCATION }} \
      #     --to-revisions=PREVIOUS_REVISION=100
      - name: Post-deploy smoke
        env:
          SERVICE_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail

          # 1. /_healthz は 200 を返す
          status=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/_healthz")
          if [ "${status}" != "200" ]; then
            echo "smoke: /_healthz returned ${status}, expected 200" >&2
            exit 1
          fi

          # 2. /slack/interactive は不正署名で 401 (Phase 0 regression)
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SERVICE_URL}/slack/interactive" \
            -H "X-Slack-Signature: v0=invalid" \
            -H "X-Slack-Request-Timestamp: 1" \
            --data-raw "payload=%7B%7D")
          if [ "${status}" != "401" ]; then
            echo "smoke: /slack/interactive bad-sig returned ${status}, expected 401" >&2
            exit 1
          fi

          # 3. /slack/command は不正署名で 401 (Phase 1 regression)
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${SERVICE_URL}/slack/command" \
            -H "X-Slack-Signature: v0=invalid" \
            -H "X-Slack-Request-Timestamp: 1" \
            --data-raw "command=%2Frunops")
          if [ "${status}" != "401" ]; then
            echo "smoke: /slack/command bad-sig returned ${status}, expected 401" >&2
            exit 1
          fi

          echo "smoke: all checks passed against ${SERVICE_URL}"

      # ADR 0031 §"Rollback target separation": create the immutable
      # prod-* tag pointing at the deployed commit and stamp the
      # Cloud Run revision label so rollback uses the same SoT pair
      # (protected git tag + revision label).
      - name: Stamp Cloud Run revision label
        env:
          SERVICE: runops-gateway
          REGION: ${{ vars.CLOUD_RUN_LOCATION }}
        run: |
          set -euo pipefail
          # The deploy-cloudrun action publishes a new revision named
          # auto-<n>; we attach a label `prod-<sha7>` so the next
          # deploy can read the previous-production commit from the
          # currently-serving revision (codex review v4 #3 + ADR 0031).
          SHA7="${DEPLOY_SHA:0:7}"
          gcloud run services update "$SERVICE" \
            --region="$REGION" \
            --update-labels="prod-sha7=${SHA7}" \
            --quiet

      - name: Create prod-* immutable tag (ADR 0031)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SERVICE: runops-gateway
          REGION: ${{ vars.CLOUD_RUN_LOCATION }}
        run: |
          set -euo pipefail
          # Tag name format: prod-YYYYMMDD-<sha7>. Created against the
          # deploy_sha. Idempotent retry-safe (ADR 0031): if the tag
          # exists pointing at the same expected previous-production
          # commit we proceed; if it points at a different commit we
          # fail loudly.
          DATE_STAMP=$(date -u +%Y%m%d)
          SHA7="${DEPLOY_SHA:0:7}"
          TAG="prod-${DATE_STAMP}-${SHA7}"

          # The "expected previous-production commit" is read from the
          # currently-serving Cloud Run revision label (set by the
          # previous successful deploy). On first deploy ever, the
          # label is missing and we accept any commit.
          PREV_SHA7=$(gcloud run services describe "$SERVICE" \
            --region="$REGION" \
            --format="value(metadata.labels.prod-sha7)" 2>/dev/null || echo "")

          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            EXISTING_SHA=$(git rev-parse "refs/tags/$TAG")
            if [ "$EXISTING_SHA" = "$DEPLOY_SHA" ]; then
              echo "tag $TAG already exists at $DEPLOY_SHA — retry-safe (ADR 0031)"
            else
              echo "::error::tag $TAG exists pointing at $EXISTING_SHA but deploy is at $DEPLOY_SHA. Refusing to retag (ADR 0031 §prod-* tag immutability)." >&2
              exit 1
            fi
          else
            git config user.name  "release-gate-bot"
            git config user.email "release-gate-bot@users.noreply.github.com"
            git tag -a "$TAG" "$DEPLOY_SHA" \
              -m "production deploy at $DEPLOY_SHA (previous prod-sha7=${PREV_SHA7:-none})"
            # Push via the workflow GITHUB_TOKEN. The Repository
            # Ruleset (tofu/github_repository.tf) restricts create on
            # prod-* to the deploy app identity; this token is the
            # workflow's bot, which the operator adds to the bypass
            # list of the ruleset on first setup.
            git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "$TAG"
          fi

      - name: Append deploy log
        env:
          SHA7: ${{ env.DEPLOY_SHA }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
          DECLARED_CATEGORY: ${{ github.event.inputs.declared_category }}
          REASON: ${{ github.event.inputs.reason }}
        run: |
          set -euo pipefail
          # docs/deploy-log.md is the human-readable auxiliary ledger
          # (ADR 0031 §"prod-* tag immutability"). The protected
          # tag + Cloud Run revision label remain the rollback SoT;
          # this file just gives operators a quick scan.
          DATE_STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          PREV_SHA7=$(gcloud run services describe runops-gateway \
            --region="${{ vars.CLOUD_RUN_LOCATION }}" \
            --format="value(metadata.labels.prod-sha7)" 2>/dev/null || echo "")
          ENTRY="| ${DATE_STAMP} | ${EVENT} | ${ACTOR} | ${DEPLOY_SHA} | ${PREV_SHA7:-(none)} | ${DECLARED_CATEGORY:-routing} | ${REASON:-auto-deploy} |"
          # Append + commit via the workflow token. This is a routing
          # change (just a markdown append) so it lands on develop
          # without dispatch.
          git config user.name  "release-gate-bot"
          git config user.email "release-gate-bot@users.noreply.github.com"
          git fetch origin develop
          git checkout origin/develop -- docs/deploy-log.md 2>/dev/null || true
          if [ ! -f docs/deploy-log.md ]; then
            mkdir -p docs
            {
              printf '%s\n' '# Production deploy log (ADR 0031)'
              printf '\n'
              printf '%s\n' 'Append-only ledger written by the cd.yaml workflow after each'
              printf '%s\n' 'production deploy. Auxiliary to the protected `prod-*` git tags'
              printf '%s\n' 'and Cloud Run revision labels (those are the rollback SoT).'
              printf '\n'
              printf '%s\n' '| timestamp_utc | trigger | actor | deploy_sha | previous_prod_sha7 | category | reason |'
              printf '%s\n' '|---|---|---|---|---|---|---|'
            } > docs/deploy-log.md
          fi
          echo "$ENTRY" >> docs/deploy-log.md
          # The append commit itself is routing-classified (markdown
          # only, no auth_boundary path matched), so it reaches the
          # develop push pipeline cleanly. Use a separate branch +
          # PR to land it on a future iteration; for now we just
          # leave the file uncommitted so the operator can review
          # and merge manually. (Auto-PR creation is a follow-up.)
          echo "deploy log entry prepared (manual commit required):"
          cat docs/deploy-log.md
