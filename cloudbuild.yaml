steps:
  # Step 1: Build and push container image
  - id: build-and-push
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}:${COMMIT_SHA}
      - -t
      - ${_IMAGE}:latest
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_IMAGE}
    waitFor:
      - build-and-push

  # Step 2: Deploy all services (no traffic). _SERVICE_NAMES may be a CSV list.
  # Revisions are written as a matching CSV to /workspace/revisions.txt.
  - id: deploy-services
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IFS=',' read -ra SERVICES <<< "${_SERVICE_NAMES}"
        REVISIONS=""
        for SVC in "$${SERVICES[@]}"; do
          SVC=$$(echo "$$SVC" | xargs)
          REV=$$(gcloud run deploy "$$SVC" \
            --image ${_IMAGE}:${COMMIT_SHA} \
            --region ${_REGION} \
            --project ${PROJECT_ID} \
            --no-traffic \
            --format="value(status.latestCreatedRevisionName)")
          echo "Deployed $$SVC -> $$REV"
          REVISIONS="$${REVISIONS:+$${REVISIONS},}$$REV"
        done
        echo "$$REVISIONS" > /workspace/revisions.txt
        echo "All revisions: $$(cat /workspace/revisions.txt)"
    waitFor:
      - push-image

  # Step 3: Update migration Job template
  - id: update-migration-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs update ${_MIGRATION_JOB_NAME} \
          --image ${_IMAGE}:${COMMIT_SHA} \
          --region ${_REGION} \
          --project ${PROJECT_ID} \
          || echo "Migration job not found, skipping"
    waitFor:
      - push-image

  # Step 3b: Update Cloud Run Worker Pools (no-promote = allocate 0 instances to
  # the new revision). Slack approval (ApproveAction → approveShift →
  # UpdateWorkerPool) shifts allocation later — same pattern as Cloud Run Service
  # --no-traffic + ShiftTraffic, but for worker pools.
  #
  # _WORKER_POOL_NAMES が空の場合は step 自体 skip (pool を持たない app 向け)。
  # 新 revision 名は /workspace/pool-revisions.txt に CSV で書き出し、
  # notify-slack step が Slack button の targets に埋める。
  - id: update-worker-pools
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        # pool-revisions.txt は notify-slack が必ず cat するので空でも先にファイルを作る。
        : > /workspace/pool-revisions.txt
        if [[ -z "${_WORKER_POOL_NAMES}" ]]; then
          echo "_WORKER_POOL_NAMES is empty, skipping worker pool image update"
          exit 0
        fi
        IFS=',' read -ra POOLS <<< "${_WORKER_POOL_NAMES}"
        POOL_REVISIONS=""
        for POOL in "$${POOLS[@]}"; do
          POOL=$$(echo "$$POOL" | xargs)
          [[ -z "$$POOL" ]] && continue
          echo "Updating worker pool $$POOL → ${_IMAGE}:${COMMIT_SHA} (no-promote)"
          if gcloud beta run worker-pools update "$$POOL" \
            --image ${_IMAGE}:${COMMIT_SHA} \
            --region ${_REGION} \
            --project ${PROJECT_ID} \
            --no-promote; then
            REV=$$(gcloud beta run worker-pools describe "$$POOL" \
              --region ${_REGION} \
              --project ${PROJECT_ID} \
              --format="value(status.latestCreatedRevisionName)")
            echo "Updated $$POOL -> $$REV"
            POOL_REVISIONS="$${POOL_REVISIONS:+$${POOL_REVISIONS},}$$REV"
          else
            echo "Worker pool $$POOL not found, skipping"
          fi
        done
        echo "$$POOL_REVISIONS" > /workspace/pool-revisions.txt
        echo "All pool revisions: $$(cat /workspace/pool-revisions.txt)"
    waitFor:
      - push-image

  # Step 4: Send Slack ChatOps notification with approval buttons.
  # Payload logic lives in scripts/notify-slack.sh (tested via Go tests).
  - id: notify-slack
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    secretEnv:
      - SLACK_WEBHOOK_URL
    args:
      - -c
      - |
        apt-get update -qq && apt-get install -yqq jq > /dev/null 2>&1
        /workspace/scripts/notify-slack.sh \
          "${_SERVICE_NAMES}" \
          "${_MIGRATION_JOB_NAME}" \
          "${BRANCH_NAME}" \
          "${COMMIT_SHA}" \
          "$$(cat /workspace/revisions.txt)" \
          "${PROJECT_ID}" \
          "${_REGION}" \
          "${_WORKER_POOL_NAMES}" \
          "$$(cat /workspace/pool-revisions.txt)"
    waitFor:
      - deploy-services
      - update-migration-job
      - update-worker-pools

substitutions:
  _IMAGE: asia-northeast1-docker.pkg.dev/${PROJECT_ID}/runops/runops-gateway
  # Comma-separated list of Cloud Run service names to deploy atomically.
  # Example single service:  _SERVICE_NAMES: frontend-service
  # Example multi-service:   _SERVICE_NAMES: frontend-service,backend-service
  _SERVICE_NAMES: frontend-service
  _MIGRATION_JOB_NAME: db-migrate-job
  # Comma-separated list of Cloud Run worker pool names. Empty → skip (apps
  # without worker pools). Example: _WORKER_POOL_NAMES: async-worker,batch-worker
  _WORKER_POOL_NAMES: ""
  _REGION: asia-northeast1
  # GCP project ID where runops-gateway (and its secrets) is hosted.
  # Override this when the managed app is in a different project.
  _GATEWAY_PROJECT: ${PROJECT_ID}

availableSecrets:
  secretManager:
    - versionName: projects/${_GATEWAY_PROJECT}/secrets/slack-webhook-url/versions/latest
      env: SLACK_WEBHOOK_URL

options:
  logging: CLOUD_LOGGING_ONLY
